<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Login</title>
    <meta name="description" content="Secure login to your account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="logo.svg" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="login-container">
      <main class="login-card">
        <header class="header">
          <h3>Welcome</h3>
          <!-- <img src="assets/icons/logo.svg" alt="Logo" class="main-logo" /> -->
        </header>
        <form id="loginForm" class="login-form" method="POST">
          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="Enter your email address"
              required
              name="email"
            />
          </div>

          <div class="input-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <button type="submit" class="toggle-password" id="togglePassword">
                <img
                  src="assets/icons/eye.svg"
                  alt="Toggle Password"
                  class="icon-eye"
                />
              </button>
            </div>
          </div>

          <button id="btnSubmit" type="submit" class="btn-primary">Log In</button>
        </form>

        <div class="separator">
          <span>Or continue with</span>
        </div>

        <div class="social-login">
          <button class="btn-social">
            <img src="assets/icons/google.svg" alt="Google" />
            <span>Google</span>
          </button>
          <button class="btn-social">
            <img src="assets/icons/apple.svg" alt="Apple" />
            <span>Apple</span>
          </button>
        </div>

        <footer class="card-footer">
          <p>
            Don't have an account? <a href="#" class="signup-link">Sign up</a>
          </p>
        </footer>
      </main>

      <footer class="site-footer">
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
          <a href="#">Help Center</a>
        </nav>
      </footer>
    </div>

    <script src="assets/js/main.js"></script>
  </body>
</html>
